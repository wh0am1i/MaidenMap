server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to the api service on the compose network.
  # When deployed behind a host nginx, this block is harmless — the host
  # nginx routes /api directly to the api container and never hits here.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed assets hard
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }
}
