# Hide nginx version in response headers and error pages.
server_tokens off;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security response headers. `always` makes them apply to error responses too.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # CSP: same-origin by default; allow map tiles from HTTPS sources (custom
  # tile providers need this) and inline styles (Leaflet + Tailwind both
  # inject them). No inline scripts, no plugins, no framing.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  # Proxy API requests to the api service on the compose network.
  # When deployed behind a host nginx, this block is harmless — the host
  # nginx routes /api directly to the api container and never hits here.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed assets hard
  location /assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }
}
